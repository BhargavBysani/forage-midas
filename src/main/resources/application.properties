# Application Configuration
spring.application.name=fraud-detection-service
server.port=8080
server.servlet.context-path=/

# Fraud Detection API Configuration
fraud.detection.api.url=http://localhost:5000

# Logging Configuration
logging.level.com.jpmc.frauddetection=INFO
logging.level.org.springframework=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true

# Application Info
info.app.name=JPMC Fraud Detection Service
info.app.description=Credit Card Fraud Detection API using Machine Learning
info.app.version=1.0.0
info.app.team=JPMC Advanced Software Engineering Program